name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to GitHub Pages
        uses: Set deploy path
        id: deploy-path
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          if [ "$branch" = "v2" ]; then
            echo "deploy_path=v2" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_path=" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.deploy-path.outputs.deploy_path }}
          keep_files: true
          exclude_assets: .github